<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me Saumya</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#fff7ed,#fde68a);
}

.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

.card{text-align:center}

/* 🎯 EMOJI ANIMATION */
.emoji{
  font-size:60px;
  margin:15px 0;
  animation:fadeIn 1s ease, bounce 2s infinite;
  cursor:pointer;
  transition:0.3s;
}

.emoji:active{
  transform:scale(1.3) rotate(10deg);
}

/* bounce */
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* fade */
@keyframes fadeIn{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(1)}
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

.yes{background:#f59e0b;color:white}
.no{background:#eee;position:relative}

/* FLOAT */
.float{
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<div id="app"></div>

<script>
const app = document.getElementById("app");
let escapeCount = 0;

function playMusic(){
  document.getElementById("bgm").play().catch(()=>{});
}

/* START */
function start(){
app.innerHTML = `
<div class="app">
  <div class="card">
    <div class="emoji" id="mainEmoji" onclick="reactEmoji()">🙃🥲</div>
    <h2>Forgive me Saumya 😔</h2>

    <p>
Others are gud…  
and u are stevia 😄💛  
sweeter than them but healthy and good for me 🍜✨  
    </p>
  </div>

  <div>
    <button class="yes" onclick="playMusic(); page2()">Yes 😊</button>
    <button class="no" id="noBtn">I don't 😒</button>
  </div>
</div>
`;

const btn = document.getElementById("noBtn");

btn.onclick = (e)=>{
  changeToSuspicious();
  if(escapeCount < 6){
    e.preventDefault();
    escapeCount++;
    move(btn);
  } else {
    pageNo1();
  }
};
}

/* 😈 CHANGE EMOJI ON "I DON'T" */
function changeToSuspicious(){
  const emoji = document.getElementById("mainEmoji");
  if(emoji){
    emoji.innerText = "🤨";
  }
}

/* 👆 CLICK EMOJI REACTION */
function reactEmoji(){
  const emoji = document.getElementById("mainEmoji");
  const reactions = ["🙂","🥲","😭","🙃","😄"];
  emoji.innerText = reactions[Math.floor(Math.random()*reactions.length)];
}

/* MOVE BUTTON */
function move(btn){
  const maxX = window.innerWidth - btn.offsetWidth - 20;
  const maxY = 200;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.position="absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* YES FLOW */
function page2(){
app.innerHTML = `
<div class="app">
  <div class="card">
    <div class="emoji">🥲😭</div>
    <h2>I was wrong 😭</h2>
    <p>pls forgive me 😔💛</p>
  </div>
  <button class="yes" onclick="page3()">Continue ➡</button>
</div>
`;
}

function page3(){
app.innerHTML = `
<div class="app">
  <div class="card">
    <div class="emoji">🙂💛</div>
    <h2>You matter</h2>
    <p>I don’t want to lose u 😭</p>
  </div>
  <button class="yes" onclick="page4()">Next ➡</button>
</div>
`;
}

function page4(){
app.innerHTML = `
<div class="app">
  <div class="card">
    <div class="emoji">🤨🥲</div>
    <h2>From my heart 💛</h2>

    <p>
U are truly one of the best things of my life 💛  
I never get tired of talking with u 😄  
and u are the best friend I could have asked for 🍜  

I am truly sorry for not expressing myself  
and not being a good friend as u were 😔  

pls forgive me  

U are truly one of the best things of my life  
I never get tired of talking with u  
and u are the best friend I could have asked for  
and I am truly sorry for not expressing myself  
and being a good friend as u were  

I will try to become a good friend from now on 🤝✨  
    </p>
  </div>

  <button class="yes" onclick="finalYes()">Forgive 😊</button>
</div>
`;
}

function finalYes(){
app.innerHTML = `
<div class="app">
  <div class="card">
    <div class="emoji">🎉🙂🍜</div>
    <h2>Thank You Saumya 💛</h2>
  </div>
</div>
`;
celebrate();
}

/* NO FLOW */
function pageNo1(){
app.innerHTML = `
<div class="app">
  <div class="card">
    <div class="emoji">😭🥲</div>
    <h2>Please 😭</h2>
  </div>

  <button class="yes" onclick="page2()">Okay fine 😅</button>
</div>
`;
}

/* CELEBRATION */
function celebrate(){
for(let i=0;i<30;i++){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=Math.random()>0.5?"🎈":"✨";
  e.style.left=Math.random()*100+"vw";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),6000);
}
}

start();
</script>

</body>
</html>
