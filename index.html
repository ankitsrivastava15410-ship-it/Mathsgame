<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive Me Saumya</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f1f5f9;
  overflow:hidden;
}

/* header */
.header{
  background:#2563eb;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* container */
.container{
  margin-top:70px;
  display:flex;
  justify-content:center;
}

/* card */
.card{
  width:90%;
  max-width:360px;
  padding:20px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
  position:relative;
}

/* buttons */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  position:relative;
}

.yes{background:#2563eb;color:#fff}
.no{
  background:#eee;
  position:absolute;
}

/* CHIBI (wavy hair vibe) */
.chibi{
  font-size:60px;
  margin-bottom:10px;
  animation:bounce 1s infinite;
}

@keyframes bounce{
  50%{transform:translateY(-8px)}
}

/* floating */
.float{
  position:absolute;
  font-size:24px;
  bottom:-50px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-120vh)}
}

/* music */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#2563eb;
  color:#fff;
  padding:12px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">💙 Friendship App</div>

<div class="container">
  <div id="app"></div>
</div>

<div class="music" onclick="toggleMusic()">🔊</div>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const app=document.getElementById("app");
const music=document.getElementById("bgMusic");
let musicOn=false;

function toggleMusic(){
  if(musicOn){
    music.pause();
    event.target.innerText="🔇";
  } else {
    music.volume=1.0;
    music.play();
    event.target.innerText="🔊";
  }
  musicOn=!musicOn;
}

// MOVE BUTTON
function moveButton(btn){
  const x = Math.random()*200 - 100;
  const y = Math.random()*200 - 100;
  btn.style.transform = `translate(${x}px, ${y}px)`;
}

// MAIN
function main(){
  app.innerHTML=`
  <div class="card">
    <div class="chibi">👩‍🦱✨</div>
    <h2>Sorry Saumya 😬</h2>
    <p>
    I was wrong...\n\n
    Others are good...\n
    but YOU are like stevia 😄\n
    sweeter than them but also healthy for me 💙\n\n
    Please forgive me yaar 🙏
    </p>

    <button class="yes" onclick="yes()">Okay I forgive you 👍</button>
    <button class="no" onclick="moveButton(this)">Nope 😤</button>
  </div>
  `;
}

// YES
function yes(){
  app.innerHTML=`
  <div class="card">
    <div class="chibi">👩‍🦱😎✨</div>
    <h2>Best Friend Forever 🤝</h2>
    <p>
    I knew it 😎\n\n
    You're honestly one of the best people in my life 🙌\n\n
    Thanks for always being there 💙
    </p>
  </div>
  `;
  celebration();
}

// celebration
function celebration(){
  for(let i=0;i<20;i++){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=Math.random()>0.5?"🎉":"✨";
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),6000);
  }
}

main();
</script>

</body>
</html>
