<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me Saumya</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#fff7ed,#fde68a);
}

/* MOBILE SAFE APP */
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
  box-sizing:border-box;
}

/* CONTENT */
.card{
  text-align:center;
}

/* BUTTON AREA */
.btns{
  position:relative;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

.yes{background:#f59e0b;color:white}
.no{
  background:#eee;
  position:relative;
}

/* CHIBI */
.chibi{
  position:relative;
  width:100px;
  height:120px;
  margin:0 auto 10px;
}

.face{
  width:70px;
  height:70px;
  background:#ffe0bd;
  border-radius:50%;
  position:absolute;
  top:30px;
  left:15px;
}

.hair{
  width:90px;
  height:60px;
  background:#111;
  border-radius:50%;
  position:absolute;
  top:0;
  left:5px;
}

.wave{
  width:20px;
  height:20px;
  background:#111;
  border-radius:50%;
  position:absolute;
  bottom:-5px;
}

.w1{left:5px}
.w2{left:30px}
.w3{right:5px}

.eye{
  width:8px;
  height:8px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:55px;
}
.e1{left:35px}
.e2{right:35px}

.mouth{
  width:20px;
  height:10px;
  border-bottom:2px solid black;
  border-radius:0 0 10px 10px;
  position:absolute;
  top:70px;
  left:40px;
}

/* FLOAT */
.float{
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<!-- 🎵 IMPORTANT: CHANGE NAME IF NEEDED -->
<audio id="bgm" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<div id="app"></div>

<script>
const app = document.getElementById("app");
let escapeCount = 0;

/* PLAY MUSIC ON BUTTON CLICK */
function playMusic(){
  const music = document.getElementById("bgm");
  music.play().catch(()=>{});
}

/* CHIBI */
function chibi(){
return `
<div class="chibi">
  <div class="hair"></div>
  <div class="wave w1"></div>
  <div class="wave w2"></div>
  <div class="wave w3"></div>
  <div class="face"></div>
  <div class="eye e1"></div>
  <div class="eye e2"></div>
  <div class="mouth"></div>
</div>
`;
}

/* START */
function start(){
app.innerHTML = `
<div class="app">
  <div class="card">
    ${chibi()}
    <h2>Forgive me Saumya 😔</h2>

    <p>
Others are gud…  
and u are stevia 😄💛  
sweeter than them but healthy and good for me 🍜✨  
    </p>
  </div>

  <div class="btns">
    <button class="yes" onclick="playMusic(); page2()">Yes 😊</button>
    <button class="no" id="noBtn">I don't 😒</button>
  </div>
</div>
`;

const btn = document.getElementById("noBtn");

btn.onclick = (e)=>{
  if(escapeCount < 6){
    e.preventDefault();
    escapeCount++;
    move(btn);
  } else {
    pageNo1();
  }
};
}

/* MOVE INSIDE SCREEN */
function move(btn){
  const container = document.querySelector(".btns");

  const maxX = container.clientWidth - btn.offsetWidth;
  const maxY = 150;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.position="absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* REST SAME FLOW */
function page2(){ app.innerHTML=`<div class="app"><div class="card">${chibi()}<h2>I was wrong 😭</h2><p>pls forgive me 😔💛🍜</p></div><button class="yes" onclick="page3()">Continue ➡</button></div>`;}
function page3(){ app.innerHTML=`<div class="app"><div class="card">${chibi()}<h2>You matter 💛</h2><p>I don’t want to lose u 😭</p></div><button class="yes" onclick="page4()">Next ➡</button></div>`;}

function page4(){
app.innerHTML=`
<div class="app">
<div class="card">
${chibi()}
<h2>From my heart 💛</h2>
<p>
U are truly one of the best things of my life 💛  
I never get tired of talking with u 😄  
and u are the best friend I could have asked for 🍜  

I am truly sorry for not expressing myself  
and not being a good friend as u were 😔  

pls forgive me  

U are truly one of the best things of my life  
I never get tired of talking with u  
and u are the best friend I could have asked for  
and I am truly sorry for not expressing myself  
and being a good friend as u were  

I will try to become a good friend from now on 🤝✨  
</p>
</div>
<button class="yes" onclick="finalYes()">Forgive 😊</button>
</div>`;
}

function finalYes(){ app.innerHTML=`<div class="app"><div class="card">${chibi()}<h2>Thank You Saumya 💛🎉</h2></div></div>`; celebrate(); }

function pageNo1(){ app.innerHTML=`<div class="app"><div class="card">${chibi()}<h2>Please 😭</h2></div><button class="yes" onclick="page2()">Okay fine 😅</button></div>`;}

function celebrate(){
for(let i=0;i<30;i++){
let e=document.createElement("div");
e.className="float";
e.innerText=Math.random()>0.5?"🎈":"✨";
e.style.left=Math.random()*100+"vw";
document.body.appendChild(e);
setTimeout(()=>e.remove(),6000);
}
}

start();
</script>

</body>
</html>
