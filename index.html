<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Trainer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .card {
      border: 2px solid #000;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    select, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    button {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled {
      background: #555;
    }
    .question {
      font-size: 28px;
      text-align: center;
      margin: 20px 0;
    }
    .options button {
      background: #fff;
      color: #000;
      border: 2px solid #000;
      margin-bottom: 10px;
    }
    .timer, .score {
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Math Trainer</h1><div id="setup" class="card">
  <label>Difficulty</label>
  <select id="difficulty">
    <option value="tiny">Tiny Kids</option>
    <option value="kids">Kids</option>
    <option value="beginner">Beginner</option>
    <option value="intermediate">Intermediate</option>
    <option value="advanced">Advanced</option>
    <option value="super">Super Advanced</option>
  </select>

  <label>Time per question (seconds)</label>
  <select id="time">
    <option value="3">3</option>
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="20">20</option>
  </select>

  <label>Questions per round</label>
  <select id="count">
    <option value="5">5</option>
    <option value="10" selected>10</option>
    <option value="15">15</option>
    <option value="20">20</option>
  </select>

  <button onclick="startGame()">Start</button>
</div>

<div id="game" class="card" style="display:none">
  <div class="timer" id="timer"></div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
  <div class="score" id="progress"></div>
</div>

<div id="end" class="card" style="display:none">
  <h2>Round Complete</h2>
  <p id="finalScore"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

  </div>  <script>
    let settings, current = 0, score = 0, timerInt, timeLeft;

    function startGame() {
      settings = {
        difficulty: difficulty.value,
        time: Math.max(3, parseInt(time.value)),
        total: parseInt(count.value)
      };
      setup.style.display = 'none';
      game.style.display = 'block';
      nextQuestion();
    }

    function getConfig(diff) {
      switch (diff) {
        case 'tiny': return { max: 5, ops: ['+'] };
        case 'kids': return { max: 10, ops: ['+', '-'] };
        case 'beginner': return { max: 20, ops: ['+', '-', '*'] };
        case 'intermediate': return { max: 100, ops: ['+', '-', '*', '/'] };
        case 'advanced': return { max: 999, ops: ['+', '-', '*', '/'] };
        case 'super': return { max: 9999, ops: ['+', '-', '*', '/'] };
      }
    }

    function nextQuestion() {
      if (current >= settings.total) return endGame();
      current++;
      progress.textContent = `Question ${current} / ${settings.total}`;
      timeLeft = settings.time;
      timer.textContent = `Time: ${timeLeft}s`;

      clearInterval(timerInt);
      timerInt = setInterval(() => {
        timeLeft--;
        timer.textContent = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
          clearInterval(timerInt);
          nextQuestion();
        }
      }, 1000);

      generateQuestion();
    }

    function generateQuestion() {
      const cfg = getConfig(settings.difficulty);
      const a = Math.floor(Math.random() * cfg.max) + 1;
      const b = Math.floor(Math.random() * cfg.max) + 1;
      const op = cfg.ops[Math.floor(Math.random() * cfg.ops.length)];

      let correct;
      switch (op) {
        case '+': correct = a + b; break;
        case '-': correct = a - b; break;
        case '*': correct = a * b; break;
        case '/': correct = parseFloat((a / b).toFixed(2)); break;
      }

      question.textContent = `${a} ${op} ${b}`;
      options.innerHTML = '';

      const answers = new Set([correct]);
      while (answers.size < 4) {
        answers.add(correct + Math.floor(Math.random() * 10 - 5));
      }

      [...answers].sort(() => Math.random() - 0.5).forEach(ans => {
        const btn = document.createElement('button');
        btn.textContent = ans;
        btn.onclick = () => {
          if (ans === correct) score++;
          clearInterval(timerInt);
          nextQuestion();
        };
        options.appendChild(btn);
      });
    }

    function endGame() {
      clearInterval(timerInt);
      game.style.display = 'none';
      end.style.display = 'block';
      finalScore.textContent = `Score: ${score} / ${settings.total}`;
    }
  </script></body>
</html>
