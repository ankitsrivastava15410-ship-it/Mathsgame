<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me Saumya</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#dbeafe,#f1f5f9);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:90%;
  max-width:360px;
  padding:20px;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
  position:relative;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

.yes{background:#2563eb;color:white}
.no{
  background:#eee;
  position:absolute;
}

/* CHIBI CHARACTER */
.chibi{
  width:100px;
  height:120px;
  margin:auto;
  position:relative;
}

.face{
  width:70px;
  height:70px;
  background:#ffe0bd;
  border-radius:50%;
  position:absolute;
  left:15px;
  top:25px;
}

.hair{
  width:90px;
  height:60px;
  background:#222;
  border-radius:50%;
  position:absolute;
  top:0;
  left:5px;
}

/* WAVY HAIR */
.hair::before,.hair::after{
  content:'';
  position:absolute;
  width:40px;
  height:40px;
  background:#222;
  border-radius:50%;
}

.hair::before{left:-10px;top:20px}
.hair::after{right:-10px;top:20px}

.eye{
  width:8px;
  height:8px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:50px;
}

.eye.left{left:30px}
.eye.right{right:30px}

.mouth{
  width:20px;
  height:10px;
  border-bottom:2px solid black;
  border-radius:0 0 20px 20px;
  position:absolute;
  top:65px;
  left:40px;
}

/* FLOATING EFFECT */
.float{
  position:absolute;
  font-size:20px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<div id="app"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const app=document.getElementById("app");
const music=document.getElementById("music");
music.volume=1.0;

// CHIBI HTML
function chibi(){
return `
<div class="chibi">
  <div class="hair"></div>
  <div class="face"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="mouth"></div>
</div>`;
}

// MOVE BUTTON
function move(btn){
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  btn.style.transform=`translate(${x}px,${y}px)`;
}

// START PAGE
function start(){
music.play();

app.innerHTML=`
<div class="card">
  ${chibi()}
  <h2>Forgive me Saumya</h2>
  <p>
Others are gud and u are stevia 😄  
sweeter than them but healthy and good for me 💙  
  </p>

  <button class="yes" onclick="yes()">Yes I forgive you</button>
  <button class="no" onclick="move(this)">I don't</button>
</div>
`;
}

// YES PAGE
function yes(){
app.innerHTML=`
<div class="card">
  ${chibi()}
  <h2>Thank you Saumya 💙</h2>
  <p>
thankyou saumya u are the best friend i could ask for  
u are very important to me  
thanks for forgiving me  
I'll never do it again
  </p>
</div>
`;
celebrate();
}

// NO PAGE
function noPage(){
app.innerHTML=`
<div class="card">
  ${chibi()}
  <h2>Please 😔</h2>
  <p>
u still have time choose correctly or i will lose my bestest friend  
pls forgive me u are my bestest friend
  </p>

  <button class="yes" onclick="yes()">Yes I forgive you</button>
  <button class="no" onclick="finalNo()">I don't</button>
</div>
`;
}

// FINAL NO
function finalNo(){
app.innerHTML=`
<div class="card">
  ${chibi()}
  <h2>Option Denied 😏</h2>
  <p>
plss na 😭  
tum mere saath pash gyi jindagi bhar ke liye  
u cant do anything about it
  </p>

  <button class="yes" onclick="yes()">Okay fine 😅</button>
</div>
`;
}

// FLOAT EFFECT
function celebrate(){
for(let i=0;i<20;i++){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=Math.random()>0.5?"🎈":"✨";
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),6000);
}
}

// BUTTON FLOW FIX
document.addEventListener("click",e=>{
if(e.target.innerText==="I don't") noPage();
});

start();
</script>

</body>
</html>
