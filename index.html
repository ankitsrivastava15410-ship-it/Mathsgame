<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me Saumya</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#fff7ed,#fef3c7);
}

/* FULL SCREEN APP */
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
  box-sizing:border-box;
}

/* CARD CONTENT */
.card{
  text-align:center;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

.yes{background:#f59e0b;color:white}
.no{background:#eee;position:relative}

/* MAGGI CHARACTER */
.maggi{
  font-size:70px;
  margin:20px 0;
  animation:bounce 1s infinite;
}

@keyframes bounce{
  50%{transform:translateY(-6px)}
}

/* FLOAT */
.float{
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById("app");
let escapeCount = 0;

// MAGGI
function maggi(){
  return `<div class="maggi">🍜😄</div>`;
}

// START
function start(){
app.innerHTML = `
<div class="app">
  <div class="card">
    ${maggi()}
    <h2>Forgive me Saumya</h2>

    <p>
Others are gud and u are stevia 😄  
sweeter than them but healthy and good for me 💛  
    </p>
  </div>

  <div>
    <button class="yes" onclick="yes()">Yes</button>
    <button class="no" id="noBtn">I don't</button>
  </div>
</div>
`;

const btn = document.getElementById("noBtn");

// MOVE AFTER FEW TRIES
btn.addEventListener("click", function(e){
  if(escapeCount < 5){
    e.preventDefault();
    escapeCount++;
    move(btn);
  } else {
    noPage();
  }
});

btn.addEventListener("touchstart", function(e){
  if(escapeCount < 5){
    e.preventDefault();
    escapeCount++;
    move(btn);
  }
});
}

// MOVE
function move(btn){
  const maxX = window.innerWidth - btn.offsetWidth - 20;
  const maxY = 200;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.position="absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

// YES PAGE
function yes(){
app.innerHTML = `
<div class="app">
  <div class="card">
    ${maggi()}
    <h2>Thank you Saumya 💛</h2>

    <p>
thankyou saumya u are the best friend i could ask for  
u are very important to me  
thanks for forgiving me  
I'll never do it again
    </p>
  </div>
</div>
`;
celebrate();
}

// NO PAGE
function noPage(){
app.innerHTML = `
<div class="app">
  <div class="card">
    ${maggi()}
    <h2>Please 😔</h2>

    <p>
u still have time choose correctly or i will lose my bestest friend  
pls forgive me u are my bestest friend
    </p>
  </div>

  <div>
    <button class="yes" onclick="yes()">Yes</button>
    <button onclick="finalNo()">I don't</button>
  </div>
</div>
`;
}

// FINAL
function finalNo(){
app.innerHTML = `
<div class="app">
  <div class="card">
    ${maggi()}
    <h2>Option Denied 😏</h2>

    <p>
plss na 😭  
tum mere saath pash gyi jindagi bhar ke liye  
u cant do anything about it
    </p>
  </div>

  <button class="yes" onclick="yes()">Okay fine 😅</button>
</div>
`;
}

// CELEBRATION
function celebrate(){
for(let i=0;i<20;i++){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=Math.random()>0.5?"🎈":"✨";
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),6000);
}
}

start();
</script>

</body>
</html>
