<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me 💛</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#fff7ed,#fde68a);
  overflow:hidden;
}

/* APP */
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* CARD */
.card{text-align:center}

/* EMOJI */
.emoji{
  font-size:60px;
  margin:15px 0;
  animation:fadeIn 1s ease, bounce 2s infinite;
  cursor:pointer;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
@keyframes fadeIn{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(1)}
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}
button:active{transform:scale(0.95)}

.yes{background:#f59e0b;color:white}
.no{
  background:#eee;
  position:fixed;
  transition:0.1s;
}

/* PROGRESS */
.progress{
  height:8px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#58cc02;
  transition:width 0.4s ease;
}

/* PAGE ANIMATION */
.fade{
  animation:fadeSlide 0.4s ease;
}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* SUCCESS */
.success{
  animation:pop 0.4s ease;
}
@keyframes pop{
  0%{transform:scale(0.7);}
  100%{transform:scale(1);}
}

/* FLOAT */
.float{
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}
@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<div id="app"></div>

<script>
const app = document.getElementById("app");

let escapeCount = 0;
let step = 1;
const totalSteps = 5;

/* RANDOM NAME */
function getName(){
  const names = ["Saumya jii 💛","Maggi Paglu 🍜","Peeli Pari 💛"];
  return names[Math.floor(Math.random()*names.length)];
}

/* MUSIC */
function playMusic(){
  document.getElementById("bgm").play().catch(()=>{});
}

/* EMOJI */
function reactEmoji(el){
  const reactions = ["🙂","🥲","😭","🙃","😄"];
  el.innerText = reactions[Math.floor(Math.random()*reactions.length)];
}

/* SUSPICIOUS */
function suspicious(){
  const e=document.getElementById("mainEmoji");
  if(e) e.innerText="🤨";
}

/* MOVE BUTTON */
function move(btn){
  const maxX = window.innerWidth - btn.offsetWidth - 10;
  const maxY = window.innerHeight - btn.offsetHeight - 10;
  btn.style.left = Math.random()*maxX+"px";
  btn.style.top = Math.random()*maxY+"px";
}

/* RUN AWAY */
function runAway(btn){
  document.addEventListener("touchstart",()=>move(btn));
}

/* PROGRESS */
function updateProgress(){
  const percent=(step/totalSteps)*100;
  const bar=document.getElementById("progressFill");
  if(bar) bar.style.width=percent+"%";
}

/* START */
function start(){
app.innerHTML=`
<div class="app fade">
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="card">
<div class="emoji" id="mainEmoji" onclick="reactEmoji(this)">🙃🥲</div>

<h2>Forgive me ${getName()} 😔💛</h2>

<p>
Others are gud…  
and u are stevia 😄💛  
sweeter than them but healthy and good for me 🍜✨  
</p>
</div>

<div>
<button class="yes" onclick="playMusic(); nextPage(page2)">Yes 😊</button>
<button class="no" id="noBtn">I don't 😒</button>
</div>
</div>
`;

const btn=document.getElementById("noBtn");

btn.onclick=(e)=>{
  suspicious();
  if(escapeCount<6){
    e.preventDefault();
    escapeCount++;
    move(btn);
  }else{
    nextPage(pageNo1);
  }
};

runAway(btn);
updateProgress();
}

/* NAVIGATION */
function nextPage(fn){
  step++;
  fn();
  setTimeout(updateProgress,50);
}

/* PAGES */
function page2(){
app.innerHTML=`
<div class="app fade">
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="card">
<div class="emoji">🥲😭</div>
<h2>I was wrong 😭</h2>
<p>pls forgive me 😔💛</p>
</div>

<button class="yes" onclick="nextPage(page3)">Continue ➡</button>
</div>
`;
}

function page3(){
app.innerHTML=`
<div class="app fade">
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="card">
<div class="emoji">🙂💛</div>
<h2>You matter</h2>
<p>I don’t want to lose u 😭</p>
</div>

<button class="yes" onclick="nextPage(page4)">Next ➡</button>
</div>
`;
}

function page4(){
app.innerHTML=`
<div class="app fade">
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="card">
<div class="emoji">🤨🥲</div>

<h2>From my heart 💛</h2>

<p>
U are truly one of the best things of my life 💛  
I never get tired of talking with u 😄  
and u are the best friend I could have asked for 🍜  

I am truly sorry for not expressing myself  
and not being a good friend as u were 😔  

pls forgive me  

Tussi hamare vadhiya mitr ho 💛  
te tussi mere naal gussa na kariya karo jii 😔  

I will try to become a good friend from now on 🤝✨  
</p>
</div>

<button class="yes" onclick="nextPage(finalYes)">Forgive 😊</button>
</div>
`;
}

function finalYes(){
app.innerHTML=`
<div class="app fade">
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="card">
<div class="emoji success">🎉🙂🍜</div>
<h2>Thank You ${getName()} 💛</h2>
</div>
</div>
`;
celebrate();
}

/* NO FLOW */
function pageNo1(){
app.innerHTML=`
<div class="app fade">
<div class="card">
<div class="emoji">😭🥲</div>
<h2>Please 😭</h2>
</div>

<button class="yes" onclick="nextPage(page2)">Okay fine 😅</button>
</div>
`;
}

/* CELEBRATION */
function celebrate(){
for(let i=0;i<40;i++){
let e=document.createElement("div");
e.className="float";
e.innerText=Math.random()>0.5?"🎈":"✨";
e.style.left=Math.random()*100+"vw";
document.body.appendChild(e);
setTimeout(()=>e.remove(),6000);
}
}

start();
</script>

</body>
</html>
