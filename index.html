<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me Saumya</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#dbeafe,#f8fafc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:350px;
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  position:relative;
}

.btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
}

.yes{background:#2563eb;color:white}
.no{background:#eee;position:absolute}

/* CHIBI */
.chibi{
  width:80px;
  height:80px;
  margin:0 auto 10px;
  position:relative;
}

.face{
  width:60px;
  height:60px;
  background:#ffe0bd;
  border-radius:50%;
  position:absolute;
  left:10px;
  top:15px;
}

.hair{
  width:70px;
  height:40px;
  background:#222;
  border-radius:50%;
  position:absolute;
  top:0;
  left:5px;
}

.eye{
  width:6px;
  height:6px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:40px;
}

.eye.left{left:25px}
.eye.right{right:25px}

.mouth{
  width:15px;
  height:8px;
  border-bottom:2px solid black;
  border-radius:0 0 10px 10px;
  position:absolute;
  top:50px;
  left:32px;
}

/* FLOAT */
.float{
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById("app");
let escapeCount = 0;

// CHIBI
function chibi(){
return `
<div class="chibi">
  <div class="hair"></div>
  <div class="face"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="mouth"></div>
</div>`;
}

// START
function start(){
app.innerHTML = `
<div class="card">
  ${chibi()}
  <h2>Forgive me Saumya</h2>

  <p>
Others are gud and u are stevia 😄  
sweeter than them but healthy and good for me 💙  
  </p>

  <div class="btns">
    <button class="yes" onclick="yes()">Yes</button>
    <button class="no" id="noBtn">I don't</button>
  </div>
</div>
`;

const btn = document.getElementById("noBtn");

// MOVE BUTTON
btn.addEventListener("click", function(e){
  if(escapeCount < 5){
    e.preventDefault();
    escapeCount++;
    move(btn);
  } else {
    noPage();
  }
});

btn.addEventListener("touchstart", function(e){
  if(escapeCount < 5){
    e.preventDefault();
    escapeCount++;
    move(btn);
  }
});
}

// MOVE FUNCTION
function move(btn){
  const card = document.querySelector(".card");

  const maxX = card.clientWidth - btn.offsetWidth - 10;
  const maxY = card.clientHeight - btn.offsetHeight - 10;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

// YES PAGE
function yes(){
app.innerHTML = `
<div class="card">
  ${chibi()}
  <h2>Thank you Saumya 💙</h2>

  <p>
thankyou saumya u are the best friend i could ask for  
u are very important to me  
thanks for forgiving me  
I'll never do it again
  </p>
</div>
`;
celebrate();
}

// NO PAGE
function noPage(){
app.innerHTML = `
<div class="card">
  ${chibi()}
  <h2>Please 😔</h2>

  <p>
u still have time choose correctly or i will lose my bestest friend  
pls forgive me u are my bestest friend
  </p>

  <div class="btns">
    <button class="yes" onclick="yes()">Yes</button>
    <button onclick="finalNo()">I don't</button>
  </div>
</div>
`;
}

// FINAL NO
function finalNo(){
app.innerHTML = `
<div class="card">
  ${chibi()}
  <h2>Option Denied 😏</h2>

  <p>
plss na 😭  
tum mere saath pash gyi jindagi bhar ke liye  
u cant do anything about it
  </p>

  <button class="yes" onclick="yes()">Okay fine 😅</button>
</div>
`;
}

// CELEBRATION
function celebrate(){
for(let i=0;i<20;i++){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=Math.random()>0.5?"🎈":"✨";
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),6000);
}
}

start();
</script>

</body>
</html>
